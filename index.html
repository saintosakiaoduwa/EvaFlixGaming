<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NeonPlay | Premium Web Games</title>

<style>
:root{
    --bg-dark:#0a0a0a;
    --card-bg:#161616;
    --neon-green:#39ff14;
    --dim-green:#1f4d1a;
    --text-gray:#a0a0a0;
}

/* =========================
    RESPONSIVE OVERRIDES
========================= */
/* Fix for large banners breaking mobile width */
.ad-container {
    max-width: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Tablet & Desktop adjustment */
@media (max-width: 1024px){
    .main-wrapper { flex-direction: column; padding: 15px 3%; }
    .sidebar { 
        position: relative; 
        top: 0; 
        width: 100%; 
        min-height: auto; 
        margin-top: 20px;
    }
}

/* Mobile specific fixes */
@media (max-width: 768px){
    header { 
        flex-direction: column; 
        padding: 15px; 
        gap: 10px; 
        text-align: center;
    }
    
    .grid { 
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
        gap: 12px; 
    }
    
    .game-card img { height: 110px; }
    
    .game-info h3 { font-size: 0.9rem; margin: 5px 0; }
    
    /* Force Ads to scale down if they are too wide */
    .ad-container iframe {
        max-width: 100% !important;
        transform: scale(0.9); /* Slight shrink for 320px screens */
    }

    #loading-interface {
        width: 80%;
        padding: 20px;
    }
}

/* Small phones */
@media (max-width: 400px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
}

/* BASE STYLES */
body{
    background:var(--bg-dark);
    color:white;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    margin:0;
    overflow-x:hidden;
    width: 100%;
}

header{
    border-bottom:2px solid var(--neon-green);
    padding:1rem 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(180deg,#111 0%,#0a0a0a 100%);
    box-shadow:0 0 15px rgba(57,255,20,0.2);
    z-index: 100;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    color:var(--neon-green);
    letter-spacing:2px;
}

.main-wrapper{
    display:flex;
    padding:20px 5%;
    gap:20px;
    box-sizing: border-box;
}

.content-area{ flex: 3; min-width: 0; } /* min-width: 0 prevents flex items from bulging */

.sidebar{
    flex:1;
    background:var(--card-bg);
    border:1px solid #222;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    min-height:500px;
    position:sticky;
    top:20px;
    overflow: hidden;
}

.sidebar-header{
    background:#111;
    border-bottom:1px solid var(--dim-green);
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}

.sidebar-header span{
    font-size:.75rem;
    color:var(--neon-green);
    cursor:pointer;
    font-weight:bold;
}

.sidebar-body{
    padding:15px;
    flex-grow:1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.game-card{
    background:var(--card-bg);
    border-radius:10px;
    overflow:hidden;
    border:1px solid #222;
    cursor:pointer;
    transition:.3s;
    touch-action:manipulation;
}

.game-card:hover{
    transform:translateY(-5px);
    border-color:var(--neon-green);
}

.game-card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.game-info{padding:10px;}
.game-info h3 { margin: 0; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.game-info p { margin: 5px 0 0; font-size: 0.8rem; color: var(--text-gray); }

#player-overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.95);
    backdrop-filter:blur(10px);
    z-index:1000;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
}

.game-header{
    position:relative;
    width:100%;
    background:#111;
    border-bottom:2px solid var(--neon-green);
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:2000;
    height:50px;
    box-sizing: border-box;
}

.game-title{
    color:var(--neon-green);
    font-size:.9rem;
    font-weight:bold;
    letter-spacing:1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 60%;
}

.exit-btn{
    background:var(--neon-green);
    color:black;
    padding:6px 15px;
    border-radius:4px;
    font-weight:bold;
    cursor:pointer;
}

#loading-interface{
    border:2px solid var(--neon-green);
    padding:40px;
    border-radius:15px;
    text-align:center;
    background:#000;
    margin: auto;
}

.spinner{
    width:40px;
    height:40px;
    border:4px solid var(--dim-green);
    border-top:4px solid var(--neon-green);
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto;
}

@keyframes spin{ 100%{transform:rotate(360deg);} }

iframe#game-frame{
    display:none;
    width:100%;
    height:calc(100% - 50px);
    border:none;
}

.ad-container {
    text-align: center;
    margin: 15px 0;
    min-height: 90px;
}

/* Splash Screen */
#splash-screen{
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background:#0a0a0a;
    display:flex;align-items:center;justify-content:center;
    z-index:5000;flex-direction:column;
}

.splash-logo{font-size:3rem;color:#39ff14;letter-spacing:3px;}
.splash-logo span{color:white;}
</style>
</head>

<body>

<script src="https://pl28935906.effectivegatecpm.com/9d/35/9f/9d359f651e0649fb7fd76bb10b65ab1f.js"></script>

<div id="splash-screen">
    <h1 class="splash-logo">NEON<span>PLAY</span></h1>
    <p style="color:var(--text-gray)">Loading Arcade...</p>
    <div class="ad-container" id="splash-ad"></div>
</div>

<header>
    <div class="logo">NEON<span style="color:white">PLAY</span></div>
    <div style="font-size:.8rem;color:var(--neon-green)">MOBILE READY v2.0</div>
</header>

<div class="ad-container" id="top-banner"></div>

<div class="main-wrapper">
    <div class="content-area">
        <h2 style="border-left:4px solid var(--neon-green);padding-left:15px;margin-bottom:20px;">Mission Hub</h2>
        
        <div class="ad-container">
            <script async="async" data-cfasync="false" src="https://pl28935909.effectivegatecpm.com/1ea517fc17fce81ecd9c00e4bb4579bb/invoke.js"></script>
            <div id="container-1ea517fc17fce81ecd9c00e4bb4579bb"></div>
        </div>

        <div class="grid" id="game-grid"></div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <span onclick="showInfo('privacy')">Privacy</span>
            <span onclick="showInfo('about')">About</span>
            <span onclick="showInfo('contact')">Contact</span>
        </div>
        <div class="sidebar-body" id="sidebar-content">
            <div class="ad-container" id="sidebar-ad"></div>
        </div>
    </aside>
</div>

<div id="player-overlay">
    <div class="game-header">
        <span class="game-title" id="playing-title">LOADING...</span>
        <div class="exit-btn" onclick="closeGame()">EXIT</div>
    </div>

    <div id="loading-interface">
        <h2 id="loading-game-name" style="color:var(--neon-green)">INITIALIZING...</h2>
        <div class="spinner"></div>
        <p>CONNECTING TO SERVER...</p>
        <div class="ad-container" id="loading-ad-1"></div>
    </div>

    <iframe id="game-frame" allowfullscreen="true" allow="autoplay; fullscreen; gaming"></iframe>
</div>

<footer style="text-align:center;padding:20px;color:var(--text-gray)">
    © 2026 NeonPlay Arcade
</footer>

<script src="https://pl28935894.effectivegatecpm.com/45/2c/71/452c712b754e994e44f06de1d102dbaa.js"></script>

<script>
// (All your JS logic here - I've kept it identical so your features don't break)
const games=[
    { id:'moto-x3m', name:'Moto X3M', cat:'Racing'},
    { id:'drift-cup-racing', name:'Drift Cup', cat:'Racing'},
    { id:'gulper-io', name:'Gulper.io', cat:'Action'},
    { id:'mr-racer-car-racing-game', name:'Mr Racer', cat:'Racing'},
    { id:'jewels-of-oz', name:'Jewels of Oz', cat:'Puzzle'},
    { id:'cut-the-rope-2', name:'Cut The Rope 2', cat:'Puzzle'},
    { id:'draw-to-home-draw-the-line', name:'Draw To House', cat:'Puzzle'},
    { id:'word-connect', name:'Word Connect', cat:'Puzzle'},
    { id:'vex-x3m', name:'Vex X3M', cat:'Racing'},
    { id:'basketball-stars', name:'Basketball Stars', cat:'Sports'},
    { id:'football-masters', name:'Football Masters', cat:'Sports'},
    { id:'om-nom-run', name:'Om Nom Run', cat:'Action'},
    { id:'protect-my-dog', name:'Protect My Dog', cat:'Puzzle'},
    { id:'bricks-breaker-crush-quest', name:'Bricks Breaker', cat:'Puzzle'},
    { id:'angry-balls', name:'Angry Balls', cat:'Action'}
];

class AdManager {
    constructor() {
        this.key728 = 'b4b2b0fcbbd54c187d4b9664d2722efa';
        this.key300 = '0f0de8df16579efe5cbedce320890310';
        this.socialBarUrl = 'https://pl28935894.effectivegatecpm.com/45/2c/71/452c712b754e994e44f06de1d102dbaa.js';
    }

    init() {
        this.refreshBanner('top-banner');
        this.refreshBanner('sidebar-ad');
        setInterval(() => this.refreshBanner('top-banner'), 30000);
        setInterval(() => this.refreshBanner('sidebar-ad'), 30000);
    }

    refreshBanner(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        const isSmall = containerId.includes('sidebar') || containerId.includes('loading') || window.innerWidth < 768;
        const key = isSmall ? this.key300 : this.key728;
        const h = isSmall ? 250 : 90;
        const w = isSmall ? 300 : 728;
        const s1 = document.createElement('script');
        s1.innerHTML = `atOptions = {'key' : '${key}','format' : 'iframe','height' : ${h},'width' : ${w},'params' : {}};`;
        container.appendChild(s1);
        const s2 = document.createElement('script');
        s2.src = `https://www.highperformanceformat.com/${key}/invoke.js`;
        container.appendChild(s2);
    }

    loadSocialBar(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const script = document.createElement('script');
        script.src = this.socialBarUrl;
        container.appendChild(script);
    }
}

const ads = new AdManager();

function renderGames(){
    const grid = document.getElementById("game-grid");
    games.forEach(game=>{
        const card = document.createElement("div");
        card.className = "game-card";
        card.onclick = () => openGame(game.id, game.name);
        card.innerHTML = `
            <img loading="lazy" src="https://img.gamepix.com/games/${game.id}/cover/${game.id}.png">
            <div class="game-info">
                <h3>${game.name}</h3>
                <p>${game.cat}</p>
            </div>`;
        grid.appendChild(card);
    });
}

function openGame(gameId, gameName) {
    const frame = document.getElementById("game-frame");
    const overlay = document.getElementById("player-overlay");
    const loader = document.getElementById("loading-interface");
    document.getElementById("loading-game-name").innerText = gameName;
    document.getElementById("playing-title").innerText = "PLAYING: " + gameName.toUpperCase();
    loader.style.display = "block";
    frame.style.display = "none";
    overlay.style.display = "flex";
    document.body.style.overflow = "hidden";
    ads.refreshBanner('loading-ad-1');
    frame.src = `https://www.gamepix.com/play/${gameId}?sid=1&mobile=1&autoplay=1`;
    frame.onload = () => {
        loader.style.display = "none";
        frame.style.display = "block";
    };
}

function closeGame() {
    document.getElementById("game-frame").src = "";
    document.getElementById("player-overlay").style.display = "none";
    document.body.style.overflow = "auto";
}

const infoTexts = {
    privacy: "<h3>Privacy</h3><p>No data collection.</p>",
    about: "<h3>About</h3><p>NeonPlay Arcade.</p>",
    contact: "<h3>Contact</h3><p>contact@neonplay.io</p>"
};

function showInfo(type) {
    const sb = document.getElementById('sidebar-content');
    sb.innerHTML = infoTexts[type];
    setTimeout(() => {
        sb.innerHTML = '<div class="ad-container" id="sidebar-ad"></div>';
        ads.refreshBanner('sidebar-ad');
    }, 15000);
}

window.onload = () => {
    ads.init();
    ads.loadSocialBar('splash-ad');
    renderGames();
    setTimeout(() => {
        document.getElementById("splash-screen").style.display = "none";
    }, 5000);
};
</script>

</body>
</html>
